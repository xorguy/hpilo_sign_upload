services:
  ilo-cert-upload:
    # Pre-built ARM64 image — no local build required.
    # See: https://hub.docker.com/r/xorguy/hpilo_sign_upload
    image: xorguy/hpilo_sign_upload:0.1
    env_file:
      # Cloudflare DNS credentials + domain + ACME email (see .env.cf.example)
      - .env.cf
    environment:
      - ILO_HOST=${ILO_HOST}
      - ILO_USER=${ILO_USER:-Administrator}
      - ILO_PASS=${ILO_PASS}
    volumes:
      # CSR file generated by iLO — set CSR_PATH in .env to the host-side path
      - ${CSR_PATH}:/csr/ilo.csr:ro
    network_mode: "bridge"
    # If the iLO is on a management VLAN that requires the host's network
    # stack/routing, switch to:
    #   network_mode: "host"
